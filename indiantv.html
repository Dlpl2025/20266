<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE VT Stream</title>
    <!-- HLS.js প্লেয়ার লাইব্রেরি -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* লোগো সেকশন */
        header {
            margin-top: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .logo-img {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* প্লেলিস্ট চ্যানেল সিলেকশন বক্স */
        .playlist-box {
            width: 100%;
            max-width: 900px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #161616;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #222;
        }
        .playlist-box label {
            font-size: 14px;
            color: #aaa;
            font-weight: bold;
        }
        .playlist-box select {
            background: #0b0b0b;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            width: 70%;
            cursor: pointer;
            outline: none;
        }
        .playlist-box select:hover {
            border-color: #ff416c;
        }

        /* ভিডিও প্লেয়ার কন্টেইনার */
        .video-container {
            width: 100%;
            max-width: 900px;
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #222;
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video, iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
            background: #000;
        }

        /* ফুটার */
        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- লোগো -->
    <header>
        <img src="logo.png" alt="LIVE VT Logo" class="logo-img">
    </header>

    <!-- চ্যানেল ড্রপডাউন মেনু (আপনার দেওয়া সম্পূর্ণ তালিকা) -->
    <div class="playlist-box">
        <label for="channelSelect">Select Channel:</label>
        <select id="channelSelect" onchange="changeChannel(this.value)">
            <option value="https://ndtvindiaelemarchana.akamaized.net/hls/live/2003679/ndtvindia/master.m3u8">NDTV India</option>
            <option value="https://d2l4ar6y3mrs4k.cloudfront.net/live-streaming/abpnews-livetv/master.m3u8">ABP News</option>
            <option value="https://d2l4ar6y3mrs4k.cloudfront.net/live-streaming/ananda-livetv/master.m3u8">ABP Ananda</option>
            <option value="https://www.youtube.com/embed/live_stream?channel=UCwtv8tqE1z_w0B9iN_V-R0Q">DD National Ⓨ</option>
            <option value="https://www.youtube.com/embed/live_stream?channel=UC4gXW6k5eE1z_w0B9iN_V-R">DD News Ⓨ</option>
            <option value="https://www.youtube.com/embed/live_stream?channel=UCa-3d2rkhfqrt">DD India Ⓨ</option>
            <option value="https://www.youtube.com/embed/live_stream?channel=UCe1FIApIafWE">DD Bharati Ⓨ</option>
            <option value="https://www.youtube.com/embed/live_stream?channel=UCDDKisan">DD Kisan Ⓨ</option>
            <option value="https://www.youtube.com/embed/live_stream?channel=UCDDUrdu">DD Urdu Ⓨ</option>
            <option value="https://www.youtube.com/embed/sYZtOFzM78M">India Today Ⓨ</option>
            <option value="https://www.youtube.com/embed/Nq2wYlWFucg">Aaj Tak Ⓨ</option>
            <option value="https://www.youtube.com/embed/e1FIApIafWE">India TV Ⓨ</option>
            <option value="https://www.youtube.com/embed/nSpwwcHVp80">TV9 Bharatvarsh Ⓨ</option>
            <option value="https://www.youtube.com/embed/3DbTO_AMhhc">Republic Bharat Ⓨ</option>
            <option value="https://ndtvprofit.akamaized.net/hls/live/2107404/ndtvprofit/master_1.m3u8">NDTV Profit</option>
        </select>
    </div>

    <!-- ভিডিও প্লেয়ার কন্টেইনার -->
    <div class="video-container" id="playerContainer">
        <video id="video" controls autoplay muted></video>
    </div>

    <!-- ফুটার -->
    <footer>
        <p>&copy; 2026 LIVE VT Platform. All Rights Reserved.</p>
    </footer>

    <!-- জাভাস্ক্রিপ্ট লজিক -->
    <script>
        var container = document.getElementById('playerContainer');
        var defaultUrl = document.getElementById('channelSelect').value;
        var hls = null;

        function playChannel(url) {
            // যদি লিংকটি ইউটিউবের হয়
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                if (hls) { hls.destroy(); hls = null; }
                
                // সাধারণ ভিডিও ট্যাগ সরিয়ে আইফ্রেম (YouTube Player) বসানো
                container.innerHTML = `<iframe src="${url}?autoplay=1&modestbranding=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
            } 
            // যদি লিংকটি m3u8 স্ট্রিম হয়
            else {
                container.innerHTML = `<video id="video" controls autoplay muted></video>`;
                var video = document.getElementById('video');

                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', function() {
                        video.play();
                    });
                } else if (Hls.isSupported()) {
                    if (hls) { hls.destroy(); }
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                }
            }
        }

        function changeChannel(url) {
            playChannel(url);
        }

        // পেজ ওপেন হওয়ার সাথে সাথে প্রথম চ্যানেল প্লে করা
        playChannel(defaultUrl);
    </script>

</body>
</html>
