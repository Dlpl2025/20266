<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE VT Stream</title>
    <!-- HLS.js প্লেয়ার লাইব্রেরি -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* সার্বিক ডিজাইন ও ব্যাকগ্রাউন্ড কালো করা */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* লোগো সেকশন */
        header {
            margin-top: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .logo-img {
            max-width: 250px; /* লোগোর সাইজ নিয়ন্ত্রণ করুন */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* ভিডিও প্লেয়ার কন্টেইনার */
        .video-container {
            width: 100%;
            max-width: 900px;
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #222; /* লোগোর নীল বর্ডারের সাথে মিলিয়ে সামান্য বর্ডার */
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        /* ফুটার বা নিচে ছোট বার্তা */
        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- ওপরের দিকে লোগো সেকশন -->
    <header>
        <img src="logo.png" alt="LIVE VT Logo" class="logo-img">
    </header>

    <!-- ভিডিও প্লেয়ার সেকশন -->
    <div class="video-container">
        <video id="video" controls autoplay muted></video>
    </div>

    <!-- ফুটার -->
    <footer>
        <p>&copy; 2026 LIVE VT Platform. All Rights Reserved.</p>
    </footer>

    <!-- జాভাস্ক্রিপ্ট কোড -->
    <script>
        var video = document.getElementById('video');
        var videoSrc = 'https://hls-harbor-livepush.akamaized.net/live_cdn/nsqIStpj8PaG-Ev/emcQJ0pGpremocy/index.m3u8';

        // ব্রাউজার সাপোর্ট চেক
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        } else if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        }
    </script>

</body>
</html>
