<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE VT Stream</title>
    <!-- HLS.js প্লেয়ার লাইব্রেরি -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* লোগো সেকশন */
        header {
            margin-top: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .logo-img {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* প্লেলিস্ট চ্যানেল সিলেকশন বক্স */
        .playlist-box {
            width: 100%;
            max-width: 900px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #161616;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #222;
        }
        .playlist-box label {
            font-size: 14px;
            color: #aaa;
            font-weight: bold;
        }
        .playlist-box select {
            background: #0b0b0b;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            width: 70%;
            cursor: pointer;
            outline: none;
        }
        .playlist-box select:hover {
            border-color: #ff416c;
        }

        /* ভিডিও প্লেয়ার কন্টেইনার */
        .video-container {
            width: 100%;
            max-width: 900px;
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #222;
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }

        /* ফুটার */
        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- লোগো -->
    <header>
        <img src="logo.png" alt="LIVE VT Logo" class="logo-img">
    </header>

    <!-- চ্যানেল ড্রপডাউন মেনু -->
    <div class="playlist-box">
        <label for="channelSelect">Select Channel:</label>
        <select id="channelSelect" onchange="changeChannel(this.value)">
            <option value="https://jmp2.uk/stvp-IN38000072R">The Movie Club</option>
            <option value="https://jmp2.uk/stvp-IN4000600Q">Bollygold</option>
            <option value="https://jmp2.uk/stvp-IN40000100Y">The Movie Club+2</option>
            <option value="https://jmp2.uk/stvp-IN460001727">Dishoom Films</option>
            <option value="https://jmp2.uk/stvp-IN330000528">WedoTV Movies</option>
            <option value="https://jmp2.uk/stvp-IN800020ZZ">Epic Bhojpuri</option>
            <option value="https://jmp2.uk/stvp-IN3800008CX">South Station</option>
            <option value="https://jmp2.uk/stvp-IN46000140Q">NH BollyFlix</option>
            <option value="https://jmp2.uk/stvp-IN21000014R">Zee Cine Classic</option>
            <option value="https://jmp2.uk/stvp-IN3900016WI">B4U Movies</option>
            <option value="https://jmp2.uk/stvp-IN39000187Z">B4U Kadak</option>
            <option value="https://jmp2.uk/stvp-IN2100005T2">Zee South Flix</option>
            <option value="https://jmp2.uk/stvp-IN3800010SH">Hollywood Desi</option>
            <option value="https://jmp2.uk/stvp-IN1600011DE">KCM</option>
            <option value="https://jmp2.uk/stvp-IN4000517J">Best Action TV</option>
            <option value="https://jmp2.uk/stvp-IN1700002C8">Pitaara</option>
            <option value="https://jmp2.uk/stvp-IN39000307N">B4U Bhojpuri</option>
            <option value="https://jmp2.uk/stvp-IN400061DB">NH Tamil Gold</option>
            <option value="https://jmp2.uk/stvp-IN46000184H">Kings Of Comedy</option>
            <option value="https://jmp2.uk/stvp-IN2100002GD">Zee Comedy Nation</option>
        </select>
    </div>

    <!-- ভিডিও প্লেয়ার কন্টেইনার -->
    <div class="video-container">
        <video id="video" controls autoplay muted></video>
    </div>

    <!-- ফুটার -->
    <footer>
        <p>&copy; 2026 LIVE VT Platform. All Rights Reserved.</p>
    </footer>

    <!-- জাভাস্ক্রিপ্ট লজিক -->
    <script>
        var video = document.getElementById('video');
        var defaultUrl = document.getElementById('channelSelect').value;
        var hls = null;

        function playChannel(url) {
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            } else if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else {
                // ব্রাউজার সরাসরি সাপোর্ট না করলে ফলব্যাক হিসেবে সোর্স সেট করা
                video.src = url;
                video.play();
            }
        }

        function changeChannel(url) {
            playChannel(url);
        }

        // পেজ লোড হওয়ার সাথে সাথে প্রথম চ্যানেল প্লে করা
        playChannel(defaultUrl);
    </script>

</body>
</html>
