<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE VT Stream</title>
    <!-- HLS.js প্লেয়ার লাইব্রেরি -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* লোগো সেকশন */
        header {
            margin-top: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .logo-img {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* প্লেলিস্ট চ্যানেল সিলেকশন বক্স */
        .playlist-box {
            width: 100%;
            max-width: 900px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #161616;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #222;
        }
        .playlist-box label {
            font-size: 14px;
            color: #aaa;
            font-weight: bold;
        }
        .playlist-box select {
            background: #0b0b0b;
            color: #fff;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            width: 70%;
            cursor: pointer;
            outline: none;
        }
        .playlist-box select:hover {
            border-color: #ff416c;
        }

        /* ভিডিও প্লেয়ার কন্টেইনার */
        .video-container {
            width: 100%;
            max-width: 900px;
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #222;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        /* ফুটার */
        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- লোগো -->
    <header>
        <img src="logo.png" alt="LIVE VT Logo" class="logo-img">
    </header>

    <!-- চ্যানেল বা প্লেলিস্ট ড্রপডাউন সিলেকশন -->
    <div class="playlist-box">
        <label for="channelSelect">Select Channel:</label>
        <select id="channelSelect" onchange="changeChannel(this.value)">
            <option value="">Loading Channels...</option>
        </select>
    </div>

    <!-- ভিডিও প্লেয়ার কন্টেইনার -->
    <div class="video-container">
        <video id="video" controls autoplay muted></video>
    </div>

    <!-- ফুটার -->
    <footer>
        <p>&copy; 2026 LIVE VT Platform. All Rights Reserved.</p>
    </footer>

    <!-- জাভাস্ক্রিপ্ট যা m3u ফাইল পার্স করে চ্যানেলগুলো ড্রপডাউনে বসাবে -->
    <script>
        var video = document.getElementById('video');
        var channelSelect = document.getElementById('channelSelect');
        var hls = null;
        var playlistUrl = 'https://iptv-org.github.io/iptv/index.m3u';

        // M3U ফাইল ফেচ করা এবং পার্স করা
        fetch(playlistUrl)
            .then(response => response.text())
            .then(data => {
                var lines = data.split('\n');
                channelSelect.innerHTML = ''; // Loading লেখা মুছে ফেলা
                var channelName = '';

                lines.forEach(line => {
                    line = line.trim();
                    if (line.startsWith('#EXTINF:')) {
                        // চ্যানেল নাম বের করা
                        var parts = line.split(',');
                        if (parts.length > 1) {
                            channelName = parts[parts.length - 1];
                        }
                    } else if (line.startsWith('http')) {
                        // স্ট্রিম লিংক এবং নাম ড্রপডাউনে যোগ করা
                        if (channelName) {
                            var option = document.createElement('option');
                            option.value = line;
                            option.textContent = channelName;
                            channelSelect.appendChild(option);
                            channelName = ''; // রিসেট
                        }
                    }
                });

                // প্রথম চ্যানেলটি অটো সিলেক্ট করে প্লে করা
                if (channelSelect.options.length > 0) {
                    playVideo(channelSelect.options[0].value);
                }
            })
            .catch(error => {
                console.error('Error loading m3u playlist:', error);
                channelSelect.innerHTML = '<option value="">Failed to load playlist</option>';
            });

        function playVideo(url) {
            if (!url) return;
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            } else if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            }
        }

        function changeChannel(url) {
            playVideo(url);
        }
    </script>

</body>
</html>
